services:
  # ====================================
  # PostgreSQL - Base de Datos Principal
  # ====================================
  sportmap-db:
    image: postgres:15-alpine
    container_name: sportmap-database
    hostname: sportmap-db

    ports:
      - "5432:5432"

    environment:
      POSTGRES_DB: sportmap_db
      POSTGRES_USER: alex
      POSTGRES_PASSWORD: 121416
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"

    volumes:
      - sportmap_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alex -d sportmap_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: unless-stopped

    networks:
      - sportmap-network

  # ====================================
  # FastAPI - Backend REST API
  # ====================================
  sportmap-api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: sportmap-api
    hostname: sportmap-api

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://alex:121416@sportmap-db:5432/sportmap_db

    depends_on:
      sportmap-db:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - sportmap-network

  # ====================================
  # pgAdmin - Interfaz de Administración
  # ====================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sportmap-pgadmin
    hostname: pgadmin

    ports:
      - "5050:80"

    environment:
      PGADMIN_DEFAULT_EMAIL: alex@gmail.com
      PGADMIN_DEFAULT_PASSWORD: 121416
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    depends_on:
      sportmap-db:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - sportmap-network

  # ====================================
  # Redis - Cache
  # ====================================
  sportmap-redis:
    image: redis:7-alpine
    container_name: sportmap-redis
    hostname: redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    command: redis-server --appendonly yes

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped

    networks:
      - sportmap-network

volumes:
  sportmap_data:
    driver: local
  pgadmin_data:
    driver: local
  redis_data:
    driver: local

networks:
  sportmap-network:
    driver: bridge
