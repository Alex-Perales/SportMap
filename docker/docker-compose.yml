services:
  # ====================================
  # PostgreSQL - Base de Datos Principal
  # ====================================
  sportmap-db:
    image: postgres:15-alpine
    container_name: sportmap-database
    hostname: sportmap-db
    
    # Puertos: interno:externo
    ports:
      - "5432:5432"
    
    # Variables de entorno
    environment:
      POSTGRES_DB: sportmap_db
      POSTGRES_USER: alex
      POSTGRES_PASSWORD: 121416
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=es_ES.UTF-8"
    
    # Volúmenes para persistencia de datos
    volumes:
      # Datos de la BD persisten en tu máquina
      - sportmap_data:/var/lib/postgresql/data
      
      # Scripts SQL para inicializar
      - ./init:/docker-entrypoint-initdb.d
    
    # Health check
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alex -d sportmap_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    # Reinicio automático
    restart: unless-stopped
    
    networks:
      - sportmap-network

  # ====================================
  # pgAdmin - Interfaz de Administración
  # ====================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sportmap-pgadmin
    hostname: pgadmin
    
    ports:
      - "5050:80"
    
    environment:
      PGADMIN_DEFAULT_EMAIL: alex@gmail.com
      PGADMIN_DEFAULT_PASSWORD: 121416
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    
    depends_on:
      sportmap-db:
        condition: service_healthy
    
    restart: unless-stopped
    
    networks:
      - sportmap-network

  # ====================================
  # Redis - Cache (Opcional)
  # ====================================
  sportmap-redis:
    image: redis:7-alpine
    container_name: sportmap-redis
    hostname: redis
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis_data:/data
    
    command: redis-server --appendonly yes
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    restart: unless-stopped
    
    networks:
      - sportmap-network

# ====================================
# Volúmenes (Almacenamiento persistente)
# ====================================
volumes:
  sportmap_data:
    driver: local
  pgadmin_data:
    driver: local
  redis_data:
    driver: local

# ====================================
# Redes (Para comunicación entre contenedores)
# ====================================
networks:
  sportmap-network:
    driver: bridge
